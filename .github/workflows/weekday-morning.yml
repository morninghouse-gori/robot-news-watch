name: Weekday Morning Robot News Watch

on:
  schedule:
    - cron: "0 23 * * 0-4"
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watcher
        env:
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python watch.py

      - name: Commit seen articles
        run: |
          git config user.name "robot-news-bot"
          git config user.email "robot-news-bot@example.com"
          git add seen.json
          git commit -m "Update seen articles" || echo "No changes to commit"
          git push
